service: acra

frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: python3.11
  region: ap-south-1
  architecture: arm64 # Use Graviton2 - matches Apple Silicon Mac builds naturally, 20% cheaper & faster
  timeout: 60 # Give the agent up to 60 seconds to think and act
  environment:
    GOOGLE_API_KEY: ${env:GOOGLE_API_KEY}
  iam:
    role:
      statements:
        # Give the Lambda permission to read EC2 instances
        - Effect: "Allow"
          Action:
            - "ec2:DescribeInstances"
            - "ec2:DescribeInstanceStatus"
          Resource: "*"
        # Give the Lambda permission to read CloudWatch logs
        - Effect: "Allow"
          Action:
            - "logs:GetLogEvents"
            - "logs:DescribeLogStreams"
          Resource: "arn:aws:logs:*:*:log-group:*"
        # Give the Lambda permission to restart instances
        - Effect: "Allow"
          Action:
            - "ec2:RebootInstances"
          Resource: "*"

# Exclude large local folders so we don't hit the AWS Lambda 250MB limit
package:
  patterns:
    - '!venv/**'
    - '!node_modules/**'
    - '!.git/**'
    - '!.gemini/**'

functions:
  agent:
    handler: src/agent.lambda_handler
    # Example EventBridge trigger: This will run the lambda on any CloudWatch Alarm state change
    events:
      - eventBridge:
          pattern:
            source:
              - aws.cloudwatch

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    pythonBin: python3
    dockerizePip: true # Docker builds for linux/arm64 on Apple Silicon - matches Lambda arm64 perfectly
    zip: true
    slim: true
